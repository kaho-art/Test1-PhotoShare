<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gallery" />
  <title>Kaho's Photo</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; font-family: 'Helvetica Neue', Arial, sans-serif; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .tc { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .tc:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.5) !important; }
    .fb { opacity: 0; transition: opacity 0.15s; }
    .tc:hover .fb, .fb.on { opacity: 1 !important; }
    select option { background: #1a1a2e; }
    input[type=range] { accent-color: #667eea; cursor: pointer; }
    input, select, textarea { font-family: inherit; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn { border: none; cursor: pointer; font-family: inherit; transition: opacity 0.15s; }
    .btn:hover { opacity: 0.82; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useMemo } = React;

// ══════════════════════════════════════════════
// ★ 設定 ★
const ADMIN_PASSWORD = "rio100sn";
const GOOGLE_API_KEY = "AIzaSyCWXdWrHMYAT5Lsm9W3A-aUJbIe1OaSkE4";
const GAS_URL = "https://script.google.com/macros/s/AKfycbztpU_bNc09NP7poBUAQfcljjdjUjxoMWfRwtEnriXJxYDpAm1uI_lcR20vAWL98GvQ/exec";
// ══════════════════════════════════════════════

// ── スプレッドシートAPI ───────────────────────
const gasGet = async (action) => {
  const res = await fetch(`${GAS_URL}?action=${action}`);
  return res.json();
};
const gasPost = async (data) => {
  const res = await fetch(GAS_URL, {
    method: "POST",
    body: JSON.stringify(data),
  });
  return res.json();
};

// ── ユーティリティ ────────────────────────────
const genId = () => Math.random().toString(36).slice(2, 10);
const fmt = (iso) => {
  if (!iso) return "—";
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};
const fmtDate = (iso) => iso ? fmt(iso).slice(0,10) : "—";
const fmtExpiry = (dateStr) => {
  if (!dateStr) return "—";
  const d = new Date(dateStr);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")}`;
};
const daysLeft = (dateStr) => Math.ceil((new Date(dateStr) - Date.now()) / 86400000);
const isExpired = (dateStr) => daysLeft(dateStr) <= 0;
const extractFolderId = (url) => { const m = url.match(/folders\/([a-zA-Z0-9_-]+)/); return m ? m[1] : url.trim(); };
const driveThumb = (id) => `https://lh3.googleusercontent.com/d/${id}=w400`;
const driveView  = (id) => `https://lh3.googleusercontent.com/d/${id}=w1920`;
const driveDownload = (id) => `https://drive.google.com/uc?export=download&id=${id}`;

// ── Google Drive 写真取得 ──────────────────────
async function fetchDrivePhotos(folderId) {
  const q = encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
  const fields = encodeURIComponent("files(id,name,imageMediaMetadata,createdTime,mimeType)");
  const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fields}&pageSize=1000&key=${GOOGLE_API_KEY}&orderBy=name`;
  const res = await fetch(url);
  if (!res.ok) throw new Error("APIエラー: " + res.status);
  const data = await res.json();
  return (data.files || []).map(f => ({
    id: f.id, filename: f.name,
    takenAt: f.imageMediaMetadata?.time
      ? new Date(f.imageMediaMetadata.time.replace(/(\d{4}):(\d{2}):(\d{2})/, "$1-$2-$3")).toISOString()
      : f.createdTime,
  }));
}

// ── アイコン ──────────────────────────────────
const HeartIcon = ({ filled }) => (
  <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2.5" fill={filled?"currentColor":"none"}>
    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
  </svg>
);
const CheckIcon = () => (
  <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" strokeWidth="3" fill="none">
    <polyline points="20 6 9 17 4 12"/>
  </svg>
);
const Spinner = () => (
  <div style={{width:"36px",height:"36px",border:"3px solid rgba(255,255,255,0.1)",borderTop:"3px solid #667eea",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto"}}/>
);

// ════════════════════════════════════════════════
// 管理者ログイン
// ════════════════════════════════════════════════
function AdminLogin({ onLogin }) {
  const [pw, setPw] = useState(""); const [err, setErr] = useState(false); const [shake, setShake] = useState(false);
  const submit = () => { if(pw===ADMIN_PASSWORD){onLogin();return;} setErr(true);setShake(true);setTimeout(()=>setShake(false),500); };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f0f1a,#1a1a2e)",padding:"20px"}}>
      <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"20px",padding:"44px 36px",width:"100%",maxWidth:"360px",animation:shake?"shake 0.4s ease":"fadeUp 0.5s ease"}}>
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <div style={{fontSize:"36px",marginBottom:"10px"}}>📷</div>
          <h1 style={{color:"#fff",fontSize:"20px",fontWeight:"300",letterSpacing:"0.15em"}}>Kaho's Photo</h1>
          <p style={{color:"rgba(255,255,255,0.3)",fontSize:"12px",marginTop:"6px"}}>管理者専用ページ</p>
        </div>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="管理者パスワード"
          style={{width:"100%",padding:"13px 15px",borderRadius:"10px",border:`1.5px solid ${err?"#ff6b6b":"rgba(255,255,255,0.15)"}`,background:"rgba(255,255,255,0.06)",color:"#fff",fontSize:"15px",outline:"none",boxSizing:"border-box"}}/>
        {err && <p style={{color:"#ff6b6b",fontSize:"12px",marginTop:"8px",textAlign:"center"}}>パスワードが違います</p>}
        <button className="btn" onClick={submit} style={{width:"100%",marginTop:"14px",padding:"13px",borderRadius:"10px",background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:"14px",fontWeight:"600"}}>ログイン</button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════
// 管理者パネル
// ════════════════════════════════════════════════
function AdminPanel({ onLogout }) {
  const [albums,  setAlbums]  = useState([]);
  const [loading, setLoading] = useState(true);
  const [saving,  setSaving]  = useState(false);
  const [tab,     setTab]     = useState("active");
  const [form,    setForm]    = useState({ title:"", folderUrl:"", password:"", expiry:"", clientName:"" });
  const [editing, setEditing] = useState(null);
  const [editExpiry, setEditExpiry] = useState("");
  const [copied,  setCopied]  = useState(null);
  const [msg,     setMsg]     = useState("");

  const showMsg = (text) => { setMsg(text); setTimeout(()=>setMsg(""), 2500); };

  const loadData = async () => {
    setLoading(true);
    try {
      const data = await gasGet("getAlbums");
      setAlbums(Array.isArray(data) ? data : []);
    } catch(e) { showMsg("読み込みエラー: " + e.message); }
    setLoading(false);
  };

  useEffect(()=>{ loadData(); },[]);

  const createAlbum = async () => {
    if (!form.title || !form.folderUrl || !form.password || !form.expiry) { showMsg("⚠️ 全項目を入力してください"); return; }
    const folderId = extractFolderId(form.folderUrl);
    if (!folderId) { showMsg("⚠️ フォルダURLが正しくありません"); return; }
    setSaving(true);
    const album = { id: genId(), title: form.title, clientName: form.clientName, folderId, password: form.password, expiry: form.expiry, createdAt: new Date().toISOString() };
    try {
      await gasPost({ action: "saveAlbum", album });
      setAlbums(prev => [...prev, album]);
      setForm({ title:"", folderUrl:"", password:"", expiry:"", clientName:"" });
      setTab("active");
      showMsg("✅ アルバムを作成しました！");
    } catch(e) { showMsg("エラー: " + e.message); }
    setSaving(false);
  };

  const updateExpiry = async (id) => {
    try {
      await gasPost({ action: "updateExpiry", id, expiry: editExpiry });
      setAlbums(prev => prev.map(a => a.id===id ? {...a, expiry: editExpiry} : a));
      setEditing(null);
      showMsg("✅ 期限を更新しました");
    } catch(e) { showMsg("エラー: " + e.message); }
  };

  const deleteAlbum = async (id) => {
    if (!confirm("このアルバムを削除しますか？")) return;
    try {
      await gasPost({ action: "deleteAlbum", id });
      setAlbums(prev => prev.filter(a => a.id!==id));
      showMsg("🗑 削除しました");
    } catch(e) { showMsg("エラー: " + e.message); }
  };

  const copyUrl = (id) => {
    const url = `${location.origin}${location.pathname}?a=${id}`;
    navigator.clipboard.writeText(url).then(()=>{ setCopied(id); setTimeout(()=>setCopied(null), 2000); });
  };

  const activeAlbums  = albums.filter(a => !isExpired(a.expiry));
  const expiredAlbums = albums.filter(a =>  isExpired(a.expiry));
  const display = tab==="active" ? activeAlbums : expiredAlbums;

  const inputStyle = { width:"100%", padding:"10px 12px", borderRadius:"8px", border:"1px solid rgba(255,255,255,0.12)", background:"rgba(255,255,255,0.06)", color:"#fff", fontSize:"13px", outline:"none", boxSizing:"border-box" };
  const labelStyle = { color:"rgba(255,255,255,0.5)", fontSize:"11px", marginBottom:"4px", display:"block" };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0f0f1a,#1a1a2e)",color:"#fff",paddingBottom:"60px"}}>
      {/* トースト */}
      {msg && (
        <div style={{position:"fixed",top:"16px",left:"50%",transform:"translateX(-50%)",background:"rgba(30,30,50,0.95)",border:"1px solid rgba(255,255,255,0.15)",color:"#fff",padding:"10px 20px",borderRadius:"20px",fontSize:"13px",zIndex:9999,whiteSpace:"nowrap",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
          {msg}
        </div>
      )}

      {/* ヘッダー */}
      <header style={{background:"rgba(15,15,26,0.9)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"14px 20px",position:"sticky",top:0,zIndex:100}}>
        <div style={{maxWidth:"900px",margin:"0 auto",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h1 style={{fontSize:"16px",fontWeight:"300",letterSpacing:"0.15em"}}>📷 Kaho's Photo</h1>
          <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
            <button className="btn" onClick={loadData} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.6)",padding:"6px 12px",borderRadius:"20px",fontSize:"12px"}}>🔄 更新</button>
            <button className="btn" onClick={onLogout} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.4)",padding:"6px 14px",borderRadius:"20px",fontSize:"12px"}}>ログアウト</button>
          </div>
        </div>
      </header>

      <div style={{maxWidth:"900px",margin:"0 auto",padding:"24px 16px"}}>
        {/* タブ */}
        <div style={{display:"flex",gap:"8px",marginBottom:"24px",flexWrap:"wrap"}}>
          {[
            ["active",  `🟢 公開中 (${activeAlbums.length})`],
            ["expired", `🔒 公開終了 (${expiredAlbums.length})`],
            ["new",     "➕ 新規作成"],
          ].map(([key,label])=>(
            <button key={key} className="btn" onClick={()=>setTab(key)} style={{padding:"8px 18px",borderRadius:"20px",border:"none",fontSize:"13px",fontWeight:"600",background:tab===key?"linear-gradient(135deg,#667eea,#764ba2)":"rgba(255,255,255,0.08)",color:"#fff"}}>
              {label}
            </button>
          ))}
        </div>

        {/* 新規作成 */}
        {tab==="new" && (
          <div style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"16px",padding:"24px",animation:"fadeUp 0.3s ease"}}>
            <h2 style={{fontSize:"15px",fontWeight:"600",marginBottom:"20px"}}>新しいアルバムを作成</h2>
            <div style={{display:"grid",gap:"14px"}}>
              <div>
                <label style={labelStyle}>アルバムタイトル</label>
                <input style={inputStyle} placeholder="例: 山田様 2025年3月撮影" value={form.title} onChange={e=>setForm({...form,title:e.target.value})}/>
              </div>
              <div>
                <label style={labelStyle}>お客さんの名前（ギャラリー内に表示）</label>
                <input style={inputStyle} placeholder="例: 山田様" value={form.clientName} onChange={e=>setForm({...form,clientName:e.target.value})}/>
              </div>
              <div>
                <label style={labelStyle}>GoogleドライブのフォルダURL</label>
                <input style={inputStyle} placeholder="https://drive.google.com/drive/folders/..." value={form.folderUrl} onChange={e=>setForm({...form,folderUrl:e.target.value})}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px"}}>
                <div>
                  <label style={labelStyle}>お客さんへのパスワード</label>
                  <input style={inputStyle} placeholder="例: flower2025" value={form.password} onChange={e=>setForm({...form,password:e.target.value})}/>
                </div>
                <div>
                  <label style={labelStyle}>公開期限</label>
                  <input type="date" style={inputStyle} value={form.expiry} onChange={e=>setForm({...form,expiry:e.target.value})}/>
                </div>
              </div>
              <button className="btn" onClick={createAlbum} disabled={saving} style={{padding:"12px",borderRadius:"10px",background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:"14px",fontWeight:"600",marginTop:"4px",opacity:saving?0.7:1}}>
                {saving ? "作成中..." : "🚀 アルバムを作成してURLを発行"}
              </button>
            </div>
          </div>
        )}

        {/* アルバム一覧 */}
        {(tab==="active" || tab==="expired") && (
          loading ? (
            <div style={{textAlign:"center",padding:"60px 0"}}><Spinner/><p style={{color:"rgba(255,255,255,0.4)",fontSize:"13px",marginTop:"16px"}}>読み込み中...</p></div>
          ) : (
            <div style={{display:"grid",gap:"12px"}}>
              {display.length===0 && (
                <div style={{textAlign:"center",padding:"60px 0",color:"rgba(255,255,255,0.3)",fontSize:"14px"}}>
                  {tab==="active"?"公開中のアルバムはありません":"公開終了のアルバムはありません"}
                </div>
              )}
              {display.map(album=>{
                const left = daysLeft(album.expiry);
                const expired = left <= 0;
                const albumUrl = `${location.origin}${location.pathname}?a=${album.id}`;
                return (
                  <div key={album.id} style={{background:"rgba(255,255,255,0.04)",border:`1px solid ${expired?"rgba(255,100,100,0.2)":"rgba(255,255,255,0.1)"}`,borderRadius:"14px",padding:"18px 20px",animation:"fadeUp 0.3s ease"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"12px",flexWrap:"wrap"}}>
                      <div style={{flex:1,minWidth:"200px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
                          <span style={{fontSize:"15px",fontWeight:"600"}}>{album.title}</span>
                          <span style={{fontSize:"11px",padding:"2px 8px",borderRadius:"10px",background:expired?"rgba(255,100,100,0.2)":"rgba(100,255,150,0.15)",color:expired?"#ff6b6b":"#48c774",fontWeight:"600"}}>
                            {expired?"公開終了":`残り${left}日`}
                          </span>
                        </div>
                        <div style={{display:"grid",gap:"4px"}}>
                          <span style={{fontSize:"12px",color:"rgba(255,255,255,0.4)"}}>👤 {album.clientName||"—"}</span>
                          <span style={{fontSize:"12px",color:"rgba(255,255,255,0.4)"}}>🔑 パスワード: <span style={{color:"#a5b4fc",fontWeight:"600"}}>{album.password}</span></span>
                          <span style={{fontSize:"12px",color:"rgba(255,255,255,0.4)",display:"flex",alignItems:"center",gap:"6px",flexWrap:"wrap"}}>
                            📅 公開期限:
                            {editing===album.id ? (
                              <span style={{display:"inline-flex",alignItems:"center",gap:"6px"}}>
                                <input type="date" value={editExpiry} onChange={e=>setEditExpiry(e.target.value)}
                                  style={{padding:"2px 8px",borderRadius:"6px",border:"1px solid rgba(255,255,255,0.2)",background:"rgba(255,255,255,0.1)",color:"#fff",fontSize:"12px",outline:"none"}}/>
                                <button className="btn" onClick={()=>updateExpiry(album.id)} style={{background:"#48c774",color:"#fff",padding:"3px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600"}}>保存</button>
                                <button className="btn" onClick={()=>setEditing(null)} style={{background:"rgba(255,255,255,0.1)",color:"#fff",padding:"3px 8px",borderRadius:"6px",fontSize:"11px"}}>✕</button>
                              </span>
                            ) : (
                              <span style={{display:"inline-flex",alignItems:"center",gap:"6px"}}>
                                {fmtExpiry(album.expiry)}
                                <button className="btn" onClick={()=>{setEditing(album.id);setEditExpiry(album.expiry);}} style={{background:"rgba(255,255,255,0.1)",color:"rgba(255,255,255,0.6)",padding:"2px 8px",borderRadius:"6px",fontSize:"11px"}}>変更</button>
                              </span>
                            )}
                          </span>
                          <span style={{fontSize:"11px",color:"rgba(255,255,255,0.2)",marginTop:"2px",wordBreak:"break-all"}}>🔗 {albumUrl}</span>
                        </div>
                      </div>
                      <div style={{display:"flex",gap:"6px",flexShrink:0,flexWrap:"wrap"}}>
                        <button className="btn" onClick={()=>copyUrl(album.id)} style={{padding:"7px 14px",borderRadius:"20px",background:copied===album.id?"#48c774":"rgba(255,255,255,0.1)",color:"#fff",fontSize:"12px",fontWeight:"600"}}>
                          {copied===album.id?"✓ コピー済":"🔗 URLコピー"}
                        </button>
                        <button className="btn" onClick={()=>window.open(albumUrl,"_blank")} style={{padding:"7px 14px",borderRadius:"20px",background:"rgba(102,126,234,0.3)",color:"#a5b4fc",fontSize:"12px",fontWeight:"600"}}>
                          👁 プレビュー
                        </button>
                        <button className="btn" onClick={()=>deleteAlbum(album.id)} style={{padding:"7px 12px",borderRadius:"20px",background:"rgba(255,100,100,0.15)",color:"#ff6b6b",fontSize:"12px"}}>
                          🗑
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════
// お客さんログイン
// ════════════════════════════════════════════════
function ClientLogin({ album, onLogin }) {
  const [pw, setPw] = useState(""); const [err, setErr] = useState(false); const [shake, setShake] = useState(false);
  const submit = () => { if(pw===album.password){onLogin();return;} setErr(true);setShake(true);setTimeout(()=>setShake(false),500); };
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)",padding:"20px"}}>
      <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px",padding:"48px 36px",width:"100%",maxWidth:"380px",animation:shake?"shake 0.4s ease":"fadeUp 0.5s ease"}}>
        <div style={{textAlign:"center",marginBottom:"36px"}}>
          <div style={{fontSize:"44px",marginBottom:"12px"}}>📷</div>
          <h1 style={{color:"#fff",fontSize:"20px",fontWeight:"300",letterSpacing:"0.2em",margin:0}}>PHOTO GALLERY</h1>
          <p style={{color:"rgba(255,255,255,0.35)",fontSize:"13px",marginTop:"8px"}}>{album.clientName||album.title} 専用ギャラリー</p>
        </div>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr(false);}} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder="パスワードを入力"
          style={{width:"100%",padding:"14px 16px",borderRadius:"12px",border:`1.5px solid ${err?"#ff6b6b":"rgba(255,255,255,0.15)"}`,background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:"16px",outline:"none",letterSpacing:"0.08em",boxSizing:"border-box"}}/>
        {err && <p style={{color:"#ff6b6b",fontSize:"12px",marginTop:"8px",textAlign:"center"}}>パスワードが違います</p>}
        <button className="btn" onClick={submit} style={{width:"100%",marginTop:"16px",padding:"14px",borderRadius:"12px",background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:"15px",fontWeight:"600"}}>
          ギャラリーを見る
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════
// ギャラリー
// ════════════════════════════════════════════════
function Gallery({ album }) {
  const storageKey = `pg_favs_${album.id}`;
  const [photos,    setPhotos]    = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [error,     setError]     = useState(null);
  const [favs,      setFavs]      = useState(()=>{try{return new Set(JSON.parse(localStorage.getItem(storageKey)||"[]"))}catch{return new Set()}});
  const [selected,  setSelected]  = useState(null);
  const [favOnly,   setFavOnly]   = useState(false);
  const [thumbSize, setThumbSize] = useState(200);
  const [sortKey,   setSortKey]   = useState("takenAt");
  const [sortDir,   setSortDir]   = useState("desc");
  const [showHelp,  setShowHelp]  = useState(false);
  const [checked,   setChecked]   = useState(new Set());
  const [selectMode,setSelectMode]= useState(false);

  useEffect(()=>{
    fetchDrivePhotos(album.folderId)
      .then(setPhotos).catch(e=>setError(e.message)).finally(()=>setLoading(false));
  },[album.folderId]);

  const toggleFav = useCallback((id)=>{
    setFavs(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);localStorage.setItem(storageKey,JSON.stringify([...next]));return next;});
  },[storageKey]);

  const toggleCheck = (id) => setChecked(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);return next;});
  const clearSelect = () => { setChecked(new Set()); setSelectMode(false); };

  const displayPhotos = useMemo(()=>[...photos]
    .filter(p=>!favOnly||favs.has(p.id))
    .sort((a,b)=>{const va=a[sortKey],vb=b[sortKey];return sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);})
  ,[photos,favOnly,favs,sortKey,sortDir]);

  const selectAll = () => setChecked(new Set(displayPhotos.map(p=>p.id)));
  const downloadSelected = () => { [...checked].forEach((id,i)=>setTimeout(()=>{const a=document.createElement("a");a.href=driveDownload(id);a.target="_blank";a.click();},i*600)); };

  const expired = isExpired(album.expiry);
  const left = daysLeft(album.expiry);

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0f0f1a,#1a1a2e,#16213e)",color:"#fff",paddingBottom:"80px"}}>
      {expired && (
        <div style={{background:"rgba(255,100,100,0.15)",borderBottom:"1px solid rgba(255,100,100,0.3)",padding:"10px 16px",textAlign:"center",fontSize:"13px",color:"#ff6b6b"}}>
          🔒 このギャラリーは公開終了しました
        </div>
      )}
      <header style={{position:"sticky",top:0,zIndex:100,background:"rgba(15,15,26,0.88)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"12px 16px"}}>
        <div style={{maxWidth:"1400px",margin:"0 auto"}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"8px"}}>
            <div>
              <h1 style={{fontSize:"16px",fontWeight:"300",letterSpacing:"0.2em"}}>📷 {album.title}</h1>
              <div style={{display:"flex",flexWrap:"wrap",gap:"10px",marginTop:"4px"}}>
                <span style={{fontSize:"11px",color:left<=7?"#ff6b6b":left<=14?"#f7a928":"rgba(255,255,255,0.4)"}}>
                  {expired?"🔒 公開終了":`⏰ 公開終了まで残り ${left} 日 (${fmtExpiry(album.expiry)})`}
                </span>
              </div>
            </div>
            <button className="btn" onClick={()=>setShowHelp(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",padding:"6px 12px",borderRadius:"20px",fontSize:"12px",flexShrink:0}}>❓</button>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"10px",flexWrap:"wrap",alignItems:"center"}}>
            <button className="btn" onClick={()=>setFavOnly(v=>!v)} style={{padding:"6px 14px",borderRadius:"20px",border:"none",fontSize:"12px",fontWeight:"600",background:favOnly?"linear-gradient(135deg,#ff6b6b,#ee5a24)":"rgba(255,255,255,0.08)",color:favOnly?"#fff":"rgba(255,255,255,0.6)"}}>
              ♥ {favOnly?`お気に入りのみ (${favs.size})`:"お気に入りのみ"}
            </button>
            <button className="btn" onClick={()=>{setSelectMode(v=>!v);if(selectMode)clearSelect();}} style={{padding:"6px 14px",borderRadius:"20px",border:"none",fontSize:"12px",fontWeight:"600",background:selectMode?"linear-gradient(135deg,#667eea,#764ba2)":"rgba(255,255,255,0.08)",color:selectMode?"#fff":"rgba(255,255,255,0.6)"}}>
              ☑️ {selectMode?"選択中":"複数選択"}
            </button>
            {selectMode && <>
              <button className="btn" onClick={selectAll} style={{padding:"6px 12px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"#fff",fontSize:"12px"}}>全選択</button>
              {checked.size>0 && <button className="btn" onClick={downloadSelected} style={{padding:"6px 14px",borderRadius:"20px",border:"none",background:"#48c774",color:"#fff",fontSize:"12px",fontWeight:"600"}}>💾 {checked.size}枚を保存</button>}
              <button className="btn" onClick={clearSelect} style={{padding:"6px 10px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.5)",fontSize:"12px"}}>✕</button>
            </>}
            <select value={sortKey} onChange={e=>setSortKey(e.target.value)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",padding:"6px 12px",borderRadius:"20px",fontSize:"12px",cursor:"pointer",outline:"none"}}>
              <option value="takenAt">撮影日</option>
              <option value="filename">ファイル名</option>
            </select>
            <button className="btn" onClick={()=>setSortDir(d=>d==="asc"?"desc":"asc")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",padding:"6px 12px",borderRadius:"20px",fontSize:"12px"}}>
              {sortDir==="asc"?"↑ 古い順":"↓ 新しい順"}
            </button>
            <span style={{fontSize:"11px",color:"rgba(255,255,255,0.35)",marginLeft:"auto"}}>{displayPhotos.length}枚</span>
          </div>
        </div>
      </header>

      <main style={{maxWidth:"1400px",margin:"0 auto",padding:"20px 12px"}}>
        {loading ? (
          <div style={{textAlign:"center",padding:"80px 0"}}><Spinner/><p style={{color:"rgba(255,255,255,0.4)",fontSize:"14px",marginTop:"16px"}}>写真を読み込み中...</p></div>
        ) : error ? (
          <div style={{textAlign:"center",padding:"80px 20px"}}>
            <p style={{color:"#ff6b6b",fontSize:"14px",marginBottom:"8px"}}>⚠️ 読み込みエラー</p>
            <p style={{color:"rgba(255,255,255,0.4)",fontSize:"12px"}}>{error}</p>
            <p style={{color:"rgba(255,255,255,0.3)",fontSize:"11px",marginTop:"12px"}}>フォルダの共有設定を「リンクを知っている全員が閲覧可能」にしてください</p>
          </div>
        ) : displayPhotos.length===0 ? (
          <div style={{textAlign:"center",padding:"80px 0",color:"rgba(255,255,255,0.3)",fontSize:"15px"}}>
            {favOnly?"♥ お気に入りはまだありません":"📂 フォルダに写真がありません"}
          </div>
        ) : (
          <div style={{display:"grid",gridTemplateColumns:`repeat(auto-fill,minmax(${thumbSize}px,1fr))`,gap:"10px"}}>
            {displayPhotos.map(photo=>{
              const isFav=favs.has(photo.id); const isChecked=checked.has(photo.id);
              return (
                <div key={photo.id} className="tc" onClick={()=>selectMode?toggleCheck(photo.id):setSelected(photo)}
                  style={{position:"relative",borderRadius:"10px",overflow:"hidden",background:"#1a1a2e",aspectRatio:"4/3",boxShadow:isChecked?"0 0 0 3px #667eea":"0 4px 16px rgba(0,0,0,0.3)",transition:"box-shadow 0.15s"}}>
                  <img src={driveThumb(photo.id)} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                  <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.7))",padding:"20px 8px 6px",fontSize:"10px",color:"rgba(255,255,255,0.8)"}}>
                    {fmtDate(photo.takenAt)}
                  </div>
                  {!selectMode && (
                    <button className={`fb${isFav?" on":""}`} onClick={e=>{e.stopPropagation();toggleFav(photo.id);}} style={{position:"absolute",top:"7px",right:"7px",background:isFav?"rgba(220,53,69,0.9)":"rgba(0,0,0,0.55)",border:"none",borderRadius:"50%",width:"32px",height:"32px",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
                      <HeartIcon filled={isFav}/>
                    </button>
                  )}
                  {selectMode && (
                    <div style={{position:"absolute",top:"7px",right:"7px",width:"28px",height:"28px",borderRadius:"50%",border:`2px solid ${isChecked?"#667eea":"rgba(255,255,255,0.6)"}`,background:isChecked?"#667eea":"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",backdropFilter:"blur(4px)"}}>
                      {isChecked && <CheckIcon/>}
                    </div>
                  )}
                </div>
              );
            })}
          </div>
        )}
      </main>

      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:"rgba(10,10,20,0.94)",backdropFilter:"blur(16px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"10px 20px",paddingBottom:"calc(10px + env(safe-area-inset-bottom))",display:"flex",alignItems:"center",justifyContent:"center",gap:"12px"}}>
        <span style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap"}}>🖼 サイズ</span>
        <input type="range" min="120" max="360" value={thumbSize} onChange={e=>setThumbSize(Number(e.target.value))} style={{width:"140px"}}/>
        <span style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",width:"32px"}}>{thumbSize}</span>
      </div>

      {selected && (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.94)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px"}} onClick={()=>setSelected(null)}>
          <div onClick={e=>e.stopPropagation()} style={{position:"relative",maxWidth:"min(90vw,700px)",width:"100%"}}>
            <img src={driveView(selected.id)} alt="" style={{width:"100%",maxHeight:"60vh",objectFit:"contain",borderRadius:"10px",display:"block"}}/>
            <div style={{position:"absolute",bottom:"10px",left:"10px",background:"rgba(0,0,0,0.65)",color:"#fff",fontSize:"11px",padding:"4px 10px",borderRadius:"20px",backdropFilter:"blur(4px)"}}>📅 {fmt(selected.takenAt)}</div>
            <button onClick={()=>toggleFav(selected.id)} style={{position:"absolute",top:"10px",right:"10px",background:favs.has(selected.id)?"rgba(220,53,69,0.9)":"rgba(0,0,0,0.6)",border:"none",borderRadius:"50%",width:"38px",height:"38px",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
              <HeartIcon filled={favs.has(selected.id)}/>
            </button>
          </div>
          <div onClick={e=>e.stopPropagation()} style={{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"16px",justifyContent:"center"}}>
            {[
              {label:"💾 元画像サイズで保存", fn:()=>window.open(driveDownload(selected.id),"_blank"), bg:"#667eea"},
              {label:"📲 LINEで共有", fn:()=>window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(driveView(selected.id))}`,"_blank"), bg:"#06c755"},
              {label:"✉️ メールで共有", fn:()=>window.open(`mailto:?subject=写真をお届けします&body=${encodeURIComponent(driveView(selected.id))}`,"_blank"), bg:"#f7a928"},
            ].map(({label,fn,bg})=>(
              <button key={label} className="btn" onClick={fn} style={{padding:"10px 16px",borderRadius:"30px",border:"none",background:bg,color:"#fff",fontSize:"13px",fontWeight:"600"}}>{label}</button>
            ))}
          </div>
          <button className="btn" onClick={()=>setSelected(null)} style={{marginTop:"14px",background:"transparent",border:"1px solid rgba(255,255,255,0.25)",color:"rgba(255,255,255,0.5)",padding:"8px 28px",borderRadius:"20px",fontSize:"13px"}}>閉じる</button>
        </div>
      )}

      {showHelp && (
        <div onClick={()=>setShowHelp(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#1a1a2e",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"20px",padding:"28px 24px",maxWidth:"440px",width:"100%",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
              <h2 style={{color:"#fff",margin:0,fontSize:"17px"}}>📖 使い方ガイド</h2>
              <button className="btn" onClick={()=>setShowHelp(false)} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:"50%",width:"32px",height:"32px",fontSize:"18px"}}>×</button>
            </div>
            {[
              ["❤️","お気に入り","ハートをタップして登録。「♥ お気に入りのみ」で絞り込めます。"],
              ["☑️","複数選択保存","「複数選択」ボタンで選択モードに。「全選択」も可。まとめて保存できます。"],
              ["📸","拡大・保存","写真をタップして拡大。元画像サイズで保存できます。"],
              ["📤","共有","拡大表示中にLINEまたはメールで共有できます。"],
              ["↕️","並び替え","撮影日・ファイル名の昇順/降順で並び替えられます。"],
              ["🖼","サイズ調整","画面下のスライダーでサムネイルの大きさを変更できます。"],
              ["📱","ホーム追加","iPhone: Safariで開いて共有ボタン→「ホーム画面に追加」\nAndroid: Chromeでメニュー→「ホーム画面に追加」"],
            ].map(([icon,title,desc])=>(
              <div key={title} style={{display:"flex",gap:"14px",marginBottom:"16px",padding:"14px",background:"rgba(255,255,255,0.04)",borderRadius:"12px"}}>
                <span style={{fontSize:"22px",flexShrink:0}}>{icon}</span>
                <div>
                  <div style={{color:"#fff",fontWeight:"600",fontSize:"13px",marginBottom:"4px"}}>{title}</div>
                  <div style={{color:"rgba(255,255,255,0.5)",fontSize:"12px",lineHeight:"1.6",whiteSpace:"pre-line"}}>{desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════
// ルーター
// ════════════════════════════════════════════════
function App() {
  const params = new URLSearchParams(location.search);
  const albumId = params.get("a");
  const isAdmin = params.get("admin") === "1";

  const [adminLoggedIn, setAdminLoggedIn] = useState(()=>sessionStorage.getItem("pg_admin")==="1");
  const [clientAuth,    setClientAuth]    = useState(()=>sessionStorage.getItem(`pg_client_${albumId}`)==="1");
  const [album,         setAlbum]         = useState(null);
  const [albumLoading,  setAlbumLoading]  = useState(!!albumId);
  const [albumNotFound, setAlbumNotFound] = useState(false);

  // アルバムページならスプシからデータ取得
  useEffect(()=>{
    if (!albumId) return;
    gasGet("getAlbums").then(data=>{
      const found = (Array.isArray(data)?data:[]).find(a=>a.id===albumId);
      if (found) setAlbum(found); else setAlbumNotFound(true);
    }).catch(()=>setAlbumNotFound(true)).finally(()=>setAlbumLoading(false));
  },[albumId]);

  if (isAdmin) {
    if (!adminLoggedIn) return <AdminLogin onLogin={()=>{sessionStorage.setItem("pg_admin","1");setAdminLoggedIn(true);}}/>;
    return <AdminPanel onLogout={()=>{sessionStorage.removeItem("pg_admin");setAdminLoggedIn(false);}}/>;
  }

  if (albumId) {
    if (albumLoading) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f1a"}}>
        <Spinner/>
      </div>
    );
    if (albumNotFound || !album) return (
      <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"#0f0f1a",color:"#fff",flexDirection:"column",gap:"12px"}}>
        <div style={{fontSize:"48px"}}>🔍</div>
        <p style={{color:"rgba(255,255,255,0.5)"}}>アルバムが見つかりません</p>
      </div>
    );
    if (!clientAuth) return <ClientLogin album={album} onLogin={()=>{sessionStorage.setItem(`pg_client_${albumId}`,"1");setClientAuth(true);}}/>;
    return <Gallery album={album}/>;
  }

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#0f0f1a,#1a1a2e)",color:"#fff",flexDirection:"column",gap:"16px",padding:"20px",textAlign:"center"}}>
      <div style={{fontSize:"56px"}}>📷</div>
      <h1 style={{fontSize:"22px",fontWeight:"300",letterSpacing:"0.2em"}}>Kaho's Photo</h1>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:"13px"}}>お客さまから届いたURLでアクセスしてください</p>
      <a href="?admin=1" style={{marginTop:"24px",color:"rgba(255,255,255,0.2)",fontSize:"11px",textDecoration:"none"}}>管理者の方はこちら</a>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
  if("serviceWorker" in navigator){
    window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
  }
</script>
</body>
</html>
