<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f0f1a" />
  <meta name="description" content="写真納品ギャラリー" />
  <link rel="manifest" href="manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gallery" />
  <title>Photo Gallery</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f1a; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
    .tc { transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; }
    .tc:hover { transform: translateY(-3px); box-shadow: 0 12px 32px rgba(0,0,0,0.5) !important; }
    .fb { opacity: 0; transition: opacity 0.15s; }
    .tc:hover .fb, .fb.on { opacity: 1 !important; }
    select option { background: #1a1a2e; }
    input[type=range] { accent-color: #667eea; cursor: pointer; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-8px)} 40%{transform:translateX(8px)} 60%{transform:translateX(-5px)} 80%{transform:translateX(5px)} }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ══════════════════════════════════════════════
    // ★ 納品ごとにここだけ変える ★
    // ══════════════════════════════════════════════
    const CONFIG = {
      password:     "photo2025",
      expiryDate:   new Date("2025-06-30"),
      shootingDate: "2025.03.15",
      clientName:   "○○様",
      folderId:     "1_RuHOtS5cEm-kIXePDIjpiSRnDIReAEp",
      apiKey:       "AIzaSyCWXdWrHMYAT5Lsm9W3A-aUJbIe1OaSkE4",
    };
    // ══════════════════════════════════════════════

    const fmt = (iso) => {
      if (!iso) return "—";
      const d = new Date(iso);
      return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,"0")}.${String(d.getDate()).padStart(2,"0")} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    };
    const fmtDate = (iso) => iso ? fmt(iso).slice(0,10) : "—";
    const daysLeft = () => Math.ceil((CONFIG.expiryDate - Date.now()) / 86400000);
    const driveThumb = (id) => `https://lh3.googleusercontent.com/d/${id}=w400`;
    const driveView  = (id) => `https://lh3.googleusercontent.com/d/${id}=w1920`;
    const driveRaw   = (id) => `https://drive.google.com/uc?export=download&id=${id}`;

    const HeartIcon = ({ filled }) => (
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2.5" fill={filled?"currentColor":"none"}>
        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
      </svg>
    );
    const CheckIcon = () => (
      <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" strokeWidth="3" fill="none">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    );

    async function fetchDrivePhotos(folderId, apiKey) {
      const q = encodeURIComponent(`'${folderId}' in parents and mimeType contains 'image/' and trashed=false`);
      const fields = encodeURIComponent("files(id,name,imageMediaMetadata,createdTime,mimeType)");
      const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fields}&pageSize=1000&key=${apiKey}&orderBy=name`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("API Error: " + res.status);
      const data = await res.json();
      return (data.files || []).map((f) => ({
        id: f.id,
        filename: f.name,
        takenAt: f.imageMediaMetadata?.time
          ? new Date(f.imageMediaMetadata.time.replace(/(\d{4}):(\d{2}):(\d{2})/, "$1-$2-$3")).toISOString()
          : f.createdTime,
        isRaw: /\.(raw|cr2|cr3|nef|arw|orf|rw2|dng)$/i.test(f.name),
      }));
    }

    function LoginScreen({ onLogin }) {
      const [pw, setPw] = useState("");
      const [err, setErr] = useState(false);
      const [shake, setShake] = useState(false);
      const submit = () => {
        if (pw === CONFIG.password) { onLogin(); return; }
        setErr(true); setShake(true);
        setTimeout(() => setShake(false), 500);
      };
      return (
        <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)",fontFamily:"'Helvetica Neue',Arial,sans-serif",padding:"20px"}}>
          <div style={{background:"rgba(255,255,255,0.05)",backdropFilter:"blur(20px)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"24px",padding:"48px 36px",width:"100%",maxWidth:"380px",boxShadow:"0 32px 64px rgba(0,0,0,0.5)",animation:shake?"shake 0.4s ease":"fadeUp 0.5s ease"}}>
            <div style={{textAlign:"center",marginBottom:"36px"}}>
              <div style={{fontSize:"44px",marginBottom:"12px"}}>📷</div>
              <h1 style={{color:"#fff",fontSize:"20px",fontWeight:"300",letterSpacing:"0.2em",margin:0}}>PHOTO GALLERY</h1>
              <p style={{color:"rgba(255,255,255,0.35)",fontSize:"13px",marginTop:"8px"}}>{CONFIG.clientName} 専用ギャラリー</p>
            </div>
            <input type="password" value={pw}
              onChange={(e)=>{setPw(e.target.value);setErr(false);}}
              onKeyDown={(e)=>e.key==="Enter"&&submit()}
              placeholder="パスワードを入力"
              style={{width:"100%",padding:"14px 16px",borderRadius:"12px",boxSizing:"border-box",border:`1.5px solid ${err?"#ff6b6b":"rgba(255,255,255,0.15)"}`,background:"rgba(255,255,255,0.07)",color:"#fff",fontSize:"16px",outline:"none",letterSpacing:"0.08em"}}
            />
            {err && <p style={{color:"#ff6b6b",fontSize:"12px",marginTop:"8px",textAlign:"center"}}>パスワードが違います</p>}
            <button onClick={submit} style={{width:"100%",marginTop:"16px",padding:"14px",borderRadius:"12px",border:"none",background:"linear-gradient(135deg,#667eea,#764ba2)",color:"#fff",fontSize:"15px",fontWeight:"600",cursor:"pointer"}}>
              ギャラリーを見る
            </button>
          </div>
        </div>
      );
    }

    function HelpModal({ onClose }) {
      const items = [
        ["❤️","お気に入り","ハートをタップして登録。「♥ お気に入りのみ」で絞り込めます。"],
        ["☑️","複数選択保存","「複数選択」ボタンで選択モードに。チェックして「全選択」も可。まとめて保存できます。"],
        ["📸","拡大・保存","写真をタップして拡大。元画像サイズ／RAWの2種類で保存できます。"],
        ["📤","共有","拡大表示中にLINEまたはメールで共有できます。"],
        ["↕️","並び替え","撮影日・ファイル名の昇順/降順で並び替えられます。"],
        ["🖼","サイズ調整","画面下のスライダーでサムネイルの大きさを変更できます。"],
        ["📱","ホーム追加","iPhone: Safariで開いて共有ボタン→「ホーム画面に追加」\nAndroid: Chromeでメニュー→「ホーム画面に追加」"],
      ];
      return (
        <div onClick={onClose} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
          <div onClick={(e)=>e.stopPropagation()} style={{background:"#1a1a2e",border:"1px solid rgba(255,255,255,0.1)",borderRadius:"20px",padding:"28px 24px",maxWidth:"440px",width:"100%",maxHeight:"85vh",overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"20px"}}>
              <h2 style={{color:"#fff",margin:0,fontSize:"17px"}}>📖 使い方ガイド</h2>
              <button onClick={onClose} style={{background:"rgba(255,255,255,0.1)",border:"none",color:"#fff",borderRadius:"50%",width:"32px",height:"32px",cursor:"pointer",fontSize:"18px"}}>×</button>
            </div>
            {items.map(([icon,title,desc])=>(
              <div key={title} style={{display:"flex",gap:"14px",marginBottom:"16px",padding:"14px",background:"rgba(255,255,255,0.04)",borderRadius:"12px"}}>
                <span style={{fontSize:"22px",flexShrink:0}}>{icon}</span>
                <div>
                  <div style={{color:"#fff",fontWeight:"600",fontSize:"13px",marginBottom:"4px"}}>{title}</div>
                  <div style={{color:"rgba(255,255,255,0.5)",fontSize:"12px",lineHeight:"1.6",whiteSpace:"pre-line"}}>{desc}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    }

    function PhotoModal({ photo, onClose, isFav, onToggleFav }) {
      const lineShare = () => window.open(`https://social-plugins.line.me/lineit/share?url=${encodeURIComponent(driveView(photo.id))}`,"_blank");
      const mailShare = () => window.open(`mailto:?subject=写真をお届けします&body=${encodeURIComponent(`撮影日: ${fmt(photo.takenAt)}\n\n${driveView(photo.id)}`)}`,"_blank");
      useEffect(()=>{
        const fn=(e)=>e.key==="Escape"&&onClose();
        window.addEventListener("keydown",fn);
        return()=>window.removeEventListener("keydown",fn);
      },[]);
      return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.94)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"16px",fontFamily:"'Helvetica Neue',Arial,sans-serif"}} onClick={onClose}>
          <div onClick={(e)=>e.stopPropagation()} style={{position:"relative",maxWidth:"min(90vw,700px)",width:"100%"}}>
            <img src={driveView(photo.id)} alt="" style={{width:"100%",maxHeight:"60vh",objectFit:"contain",borderRadius:"10px",display:"block"}}/>
            <div style={{position:"absolute",bottom:"10px",left:"10px",background:"rgba(0,0,0,0.65)",color:"#fff",fontSize:"11px",padding:"4px 10px",borderRadius:"20px",backdropFilter:"blur(4px)"}}>
              📅 {fmt(photo.takenAt)}
            </div>
            <button onClick={onToggleFav} style={{position:"absolute",top:"10px",right:"10px",background:isFav?"rgba(220,53,69,0.9)":"rgba(0,0,0,0.6)",border:"none",borderRadius:"50%",width:"38px",height:"38px",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
              <HeartIcon filled={isFav}/>
            </button>
          </div>
          <div onClick={(e)=>e.stopPropagation()} style={{display:"flex",flexWrap:"wrap",gap:"8px",marginTop:"16px",justifyContent:"center"}}>
            {[
              {label:"💾 元画像サイズで保存", fn:()=>window.open(driveRaw(photo.id),"_blank"), bg:"#667eea"},
              {label:"🗂 RAWで保存",          fn:()=>window.open(driveRaw(photo.id),"_blank"), bg:"#e17055"},
              {label:"📲 LINEで共有",         fn:lineShare,                                     bg:"#06c755"},
              {label:"✉️ メールで共有",       fn:mailShare,                                     bg:"#f7a928"},
            ].map(({label,fn,bg})=>(
              <button key={label} onClick={fn} style={{padding:"10px 16px",borderRadius:"30px",border:"none",background:bg,color:"#fff",fontSize:"13px",fontWeight:"600",cursor:"pointer"}}>{label}</button>
            ))}
          </div>
          <button onClick={onClose} style={{marginTop:"14px",background:"transparent",border:"1px solid rgba(255,255,255,0.25)",color:"rgba(255,255,255,0.5)",padding:"8px 28px",borderRadius:"20px",cursor:"pointer",fontSize:"13px"}}>閉じる</button>
        </div>
      );
    }

    function App() {
      const [loggedIn,   setLoggedIn]   = useState(()=>sessionStorage.getItem("pg_auth")==="1");
      const [photos,     setPhotos]     = useState([]);
      const [loading,    setLoading]    = useState(false);
      const [error,      setError]      = useState(null);
      const [favs,       setFavs]       = useState(()=>{try{return new Set(JSON.parse(localStorage.getItem("pg_favs")||"[]"))}catch{return new Set()}});
      const [selected,   setSelected]   = useState(null);
      const [favOnly,    setFavOnly]    = useState(false);
      const [thumbSize,  setThumbSize]  = useState(200);
      const [sortKey,    setSortKey]    = useState("takenAt");
      const [sortDir,    setSortDir]    = useState("desc");
      const [showHelp,   setShowHelp]   = useState(false);
      const [checked,    setChecked]    = useState(new Set());
      const [selectMode, setSelectMode] = useState(false);
      const [installPrompt, setInstallPrompt] = useState(null);

      useEffect(()=>{
        const h=(e)=>{e.preventDefault();setInstallPrompt(e);};
        window.addEventListener("beforeinstallprompt",h);
        return()=>window.removeEventListener("beforeinstallprompt",h);
      },[]);

      useEffect(()=>{
        if(!loggedIn) return;
        setLoading(true);
        fetchDrivePhotos(CONFIG.folderId, CONFIG.apiKey)
          .then(setPhotos)
          .catch(e=>setError(e.message))
          .finally(()=>setLoading(false));
      },[loggedIn]);

      const handleLogin = ()=>{sessionStorage.setItem("pg_auth","1");setLoggedIn(true);};
      const toggleFav = useCallback((id)=>{
        setFavs(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);localStorage.setItem("pg_favs",JSON.stringify([...next]));return next;});
      },[]);

      const toggleCheck = (id) => setChecked(prev=>{const next=new Set(prev);next.has(id)?next.delete(id):next.add(id);return next;});
      const clearSelect = () => { setChecked(new Set()); setSelectMode(false); };

      const displayPhotos = [...photos]
        .filter(p=>!favOnly||favs.has(p.id))
        .sort((a,b)=>{const va=a[sortKey],vb=b[sortKey];return sortDir==="asc"?(va>vb?1:-1):(va<vb?1:-1);});

      const selectAll = () => setChecked(new Set(displayPhotos.map(p=>p.id)));

      const downloadSelected = () => {
        [...checked].forEach((id,i)=>{
          setTimeout(()=>{
            const a=document.createElement("a");
            a.href=driveRaw(id);
            a.target="_blank";
            a.click();
          },i*600);
        });
      };

      const remaining = daysLeft();
      if(!loggedIn) return <LoginScreen onLogin={handleLogin}/>;

      return (
        <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0f0f1a 0%,#1a1a2e 60%,#16213e 100%)",fontFamily:"'Helvetica Neue',Arial,sans-serif",color:"#fff",paddingBottom:"80px"}}>

          {installPrompt && (
            <div style={{background:"linear-gradient(135deg,#667eea,#764ba2)",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",gap:"12px"}}>
              <span style={{fontSize:"13px"}}>📱 ホーム画面に追加してアプリとして使えます</span>
              <div style={{display:"flex",gap:"8px",flexShrink:0}}>
                <button onClick={()=>{installPrompt.prompt();setInstallPrompt(null);}} style={{background:"#fff",color:"#667eea",border:"none",padding:"6px 14px",borderRadius:"20px",fontSize:"12px",fontWeight:"700",cursor:"pointer"}}>追加する</button>
                <button onClick={()=>setInstallPrompt(null)} style={{background:"rgba(255,255,255,0.2)",color:"#fff",border:"none",padding:"6px 10px",borderRadius:"20px",fontSize:"12px",cursor:"pointer"}}>×</button>
              </div>
            </div>
          )}

          <header style={{position:"sticky",top:0,zIndex:100,background:"rgba(15,15,26,0.88)",backdropFilter:"blur(20px)",borderBottom:"1px solid rgba(255,255,255,0.08)",padding:"12px 16px"}}>
            <div style={{maxWidth:"1400px",margin:"0 auto"}}>
              <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:"8px"}}>
                <div>
                  <h1 style={{fontSize:"16px",fontWeight:"300",letterSpacing:"0.2em"}}>📷 PHOTO GALLERY</h1>
                  <div style={{display:"flex",flexWrap:"wrap",gap:"10px",marginTop:"4px"}}>
                    <span style={{fontSize:"11px",color:"rgba(255,255,255,0.4)"}}>撮影日: {CONFIG.shootingDate}</span>
                    <span style={{fontSize:"11px",color:remaining<=7?"#ff6b6b":remaining<=14?"#f7a928":"rgba(255,255,255,0.4)"}}>
                      {remaining>0?`⏰ 公開終了まで残り ${remaining} 日 (${CONFIG.expiryDate.toLocaleDateString("ja-JP")})`:"🔒 公開終了"}
                    </span>
                  </div>
                </div>
                <div style={{display:"flex",gap:"6px",flexShrink:0}}>
                  <button onClick={()=>setShowHelp(true)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",padding:"6px 12px",borderRadius:"20px",cursor:"pointer",fontSize:"12px"}}>❓</button>
                  <button onClick={()=>{sessionStorage.removeItem("pg_auth");setLoggedIn(false);}} style={{background:"transparent",border:"1px solid rgba(255,255,255,0.12)",color:"rgba(255,255,255,0.4)",padding:"6px 12px",borderRadius:"20px",cursor:"pointer",fontSize:"12px"}}>ログアウト</button>
                </div>
              </div>

              <div style={{display:"flex",gap:"8px",marginTop:"10px",flexWrap:"wrap",alignItems:"center"}}>
                <button onClick={()=>setFavOnly(v=>!v)} style={{padding:"6px 14px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",background:favOnly?"linear-gradient(135deg,#ff6b6b,#ee5a24)":"rgba(255,255,255,0.08)",color:favOnly?"#fff":"rgba(255,255,255,0.6)"}}>
                  ♥ {favOnly?`お気に入りのみ (${favs.size})`:"お気に入りのみ"}
                </button>
                <button onClick={()=>{setSelectMode(v=>!v);if(selectMode)clearSelect();}} style={{padding:"6px 14px",borderRadius:"20px",border:"none",cursor:"pointer",fontSize:"12px",fontWeight:"600",background:selectMode?"linear-gradient(135deg,#667eea,#764ba2)":"rgba(255,255,255,0.08)",color:selectMode?"#fff":"rgba(255,255,255,0.6)"}}>
                  ☑️ {selectMode?"選択中":"複数選択"}
                </button>
                {selectMode && <>
                  <button onClick={selectAll} style={{padding:"6px 12px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.2)",background:"transparent",color:"#fff",fontSize:"12px",cursor:"pointer"}}>全選択</button>
                  {checked.size>0 && (
                    <button onClick={downloadSelected} style={{padding:"6px 14px",borderRadius:"20px",border:"none",background:"#48c774",color:"#fff",fontSize:"12px",fontWeight:"600",cursor:"pointer"}}>
                      💾 {checked.size}枚を保存
                    </button>
                  )}
                  <button onClick={clearSelect} style={{padding:"6px 10px",borderRadius:"20px",border:"1px solid rgba(255,255,255,0.15)",background:"transparent",color:"rgba(255,255,255,0.5)",fontSize:"12px",cursor:"pointer"}}>✕ 解除</button>
                </>}
                <select value={sortKey} onChange={(e)=>setSortKey(e.target.value)} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",padding:"6px 12px",borderRadius:"20px",fontSize:"12px",cursor:"pointer",outline:"none"}}>
                  <option value="takenAt">撮影日</option>
                  <option value="filename">ファイル名</option>
                </select>
                <button onClick={()=>setSortDir(d=>d==="asc"?"desc":"asc")} style={{background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.12)",color:"#fff",padding:"6px 12px",borderRadius:"20px",fontSize:"12px",cursor:"pointer"}}>
                  {sortDir==="asc"?"↑ 古い順":"↓ 新しい順"}
                </button>
                <span style={{fontSize:"11px",color:"rgba(255,255,255,0.35)",marginLeft:"auto"}}>{displayPhotos.length}枚</span>
              </div>
            </div>
          </header>

          <main style={{maxWidth:"1400px",margin:"0 auto",padding:"20px 12px"}}>
            {loading ? (
              <div style={{textAlign:"center",padding:"80px 0"}}>
                <div style={{width:"40px",height:"40px",border:"3px solid rgba(255,255,255,0.1)",borderTop:"3px solid #667eea",borderRadius:"50%",animation:"spin 0.8s linear infinite",margin:"0 auto 16px"}}/>
                <p style={{color:"rgba(255,255,255,0.4)",fontSize:"14px"}}>写真を読み込み中...</p>
              </div>
            ) : error ? (
              <div style={{textAlign:"center",padding:"80px 20px"}}>
                <p style={{color:"#ff6b6b",fontSize:"14px",marginBottom:"8px"}}>⚠️ 読み込みエラー</p>
                <p style={{color:"rgba(255,255,255,0.4)",fontSize:"12px"}}>{error}</p>
                <p style={{color:"rgba(255,255,255,0.3)",fontSize:"11px",marginTop:"12px"}}>フォルダの共有設定を「リンクを知っている全員が閲覧可能」にしてください</p>
              </div>
            ) : displayPhotos.length===0 ? (
              <div style={{textAlign:"center",padding:"80px 0",color:"rgba(255,255,255,0.3)",fontSize:"15px"}}>
                {favOnly?"♥ お気に入りはまだありません":"📂 フォルダに写真がありません"}
              </div>
            ) : (
              <div style={{display:"grid",gridTemplateColumns:`repeat(auto-fill,minmax(${thumbSize}px,1fr))`,gap:"10px"}}>
                {displayPhotos.map(photo=>{
                  const isFav=favs.has(photo.id);
                  const isChecked=checked.has(photo.id);
                  return (
                    <div key={photo.id} className="tc"
                      onClick={()=>selectMode?toggleCheck(photo.id):setSelected(photo)}
                      style={{position:"relative",borderRadius:"10px",overflow:"hidden",background:"#1a1a2e",aspectRatio:"4/3",boxShadow:isChecked?"0 0 0 3px #667eea":"0 4px 16px rgba(0,0,0,0.3)",transition:"box-shadow 0.15s"}}>
                      <img src={driveThumb(photo.id)} alt="" loading="lazy" style={{width:"100%",height:"100%",objectFit:"cover",display:"block"}}/>
                      <div style={{position:"absolute",bottom:0,left:0,right:0,background:"linear-gradient(transparent,rgba(0,0,0,0.7))",padding:"20px 8px 6px",fontSize:"10px",color:"rgba(255,255,255,0.8)"}}>
                        {fmtDate(photo.takenAt)}
                        {photo.isRaw && <span style={{marginLeft:"6px",background:"#e17055",color:"#fff",fontSize:"9px",padding:"1px 5px",borderRadius:"4px"}}>RAW</span>}
                      </div>
                      {!selectMode && (
                        <button className={`fb${isFav?" on":""}`} onClick={(e)=>{e.stopPropagation();toggleFav(photo.id);}} style={{position:"absolute",top:"7px",right:"7px",background:isFav?"rgba(220,53,69,0.9)":"rgba(0,0,0,0.55)",border:"none",borderRadius:"50%",width:"32px",height:"32px",color:"#fff",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(4px)"}}>
                          <HeartIcon filled={isFav}/>
                        </button>
                      )}
                      {selectMode && (
                        <div style={{position:"absolute",top:"7px",right:"7px",width:"28px",height:"28px",borderRadius:"50%",border:`2px solid ${isChecked?"#667eea":"rgba(255,255,255,0.6)"}`,background:isChecked?"#667eea":"rgba(0,0,0,0.55)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",backdropFilter:"blur(4px)"}}>
                          {isChecked && <CheckIcon/>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </main>

          <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:200,background:"rgba(10,10,20,0.94)",backdropFilter:"blur(16px)",borderTop:"1px solid rgba(255,255,255,0.08)",padding:"10px 20px",paddingBottom:"calc(10px + env(safe-area-inset-bottom))",display:"flex",alignItems:"center",justifyContent:"center",gap:"12px"}}>
            <span style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",whiteSpace:"nowrap"}}>🖼 サイズ</span>
            <input type="range" min="120" max="360" value={thumbSize} onChange={(e)=>setThumbSize(Number(e.target.value))} style={{width:"140px"}}/>
            <span style={{fontSize:"11px",color:"rgba(255,255,255,0.4)",width:"32px"}}>{thumbSize}</span>
          </div>

          {selected && <PhotoModal photo={selected} onClose={()=>setSelected(null)} isFav={favs.has(selected.id)} onToggleFav={()=>toggleFav(selected.id)}/>}
          {showHelp  && <HelpModal onClose={()=>setShowHelp(false)}/>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js").catch(()=>{}));
    }
  </script>
</body>
</html>
